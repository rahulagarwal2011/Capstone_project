# Ray cluster manifest for KubeRay operator
# TODO[Phase-4]: Full KubeRay CRD with GPU node selectors
apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: reason-reduce-cluster
spec:
  headGroupSpec:
    rayStartParams:
      dashboard-host: '0.0.0.0'
    template:
      spec:
        containers:
          - name: ray-head
            image: rayproject/ray:2.9.0-py311
            resources:
              limits:
                cpu: "2"
                memory: "4Gi"
  workerGroupSpecs:
    - replicas: 4
      minReplicas: 1
      maxReplicas: 16
      groupName: workers
      rayStartParams: {}
      template:
        spec:
          containers:
            - name: ray-worker
              image: rayproject/ray:2.9.0-py311
              resources:
                limits:
                  cpu: "2"
                  memory: "4Gi"
