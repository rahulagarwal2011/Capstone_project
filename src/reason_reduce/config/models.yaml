# Reason-Reduce Model Registry
# Each entry describes a model available for the reason() operator.

models:
  # === API Models (no GPU needed, works on MacBook M4) ===
  - name: deepseek
    hf_id: deepseek-ai/deepseek-chat
    vram_gb: 0.0
    ctx_len: 65536
    quantization: none
    cost_per_1k: 0.0014

  - name: deepseek-reasoner
    hf_id: deepseek-ai/deepseek-reasoner
    vram_gb: 0.0
    ctx_len: 65536
    quantization: none
    cost_per_1k: 0.0055

  # === Local Models (for vLLM on HPC cluster) ===
  - name: mistral-7b
    hf_id: mistralai/Mistral-7B-Instruct-v0.3
    vram_gb: 5.0
    ctx_len: 8192
    quantization: awq
    cost_per_1k: 0.02

  - name: llama-3.1-8b
    hf_id: meta-llama/Llama-3.1-8B-Instruct
    vram_gb: 6.0
    ctx_len: 8192
    quantization: awq
    cost_per_1k: 0.025

  - name: llama-3.1-70b
    hf_id: meta-llama/Llama-3.1-70B-Instruct
    vram_gb: 40.0
    ctx_len: 8192
    quantization: gptq
    cost_per_1k: 0.15
